    <script>
        var ServerIP = "119.254.89.99";
        var ServerPort = "5804";
        window.parent.postMessage("object",'*');//用于通知手机更改回退按纽事件
        // Don't use window.onLoad like this in production, because it can only listen to one function.
        window.onload = function() {
            initData();
            //启动WEBSOCKET
            connect();
            ReceiveHeart = new Date();
            TimerWs = window.setInterval(TimerWs_tick, 10000);
            //请求注册数据
            //sendMyMessage({"type":"reg","sn":"30000001"});
            //
            var eventsHandler;
            eventsHandler = {
                haltEventListeners: ['touchstart', 'touchend', 'touchmove', 'touchleave', 'touchcancel']
                , init: function(options) {
                    var instance = options.instance
                    , initialScale = 1
                    , pannedX = 0
                    , pannedY = 0

                    // Init Hammer
                    // Listen only for pointer and touch events
                    this.hammer = Hammer(options.svgElement, {
                    inputClass: Hammer.SUPPORT_POINTER_EVENTS ? Hammer.PointerEventInput : Hammer.TouchInput
                    })

                    // Enable pinch
                    this.hammer.get('pinch').set({enable: true})

                    // Handle double tap
                    this.hammer.on('doubletap', function(ev){
                    instance.zoomIn()
                    })

                    // Handle pan
                    this.hammer.on('panstart panmove', function(ev){
                    // On pan start reset panned variables
                    if (ev.type === 'panstart') {
                        pannedX = 0
                        pannedY = 0
                    }

                    // Pan only the difference
                    instance.panBy({x: ev.deltaX - pannedX, y: ev.deltaY - pannedY})
                    pannedX = ev.deltaX
                    pannedY = ev.deltaY
                    })

                    // Handle pinch
                    this.hammer.on('pinchstart pinchmove', function(ev){
                    // On pinch start remember initial zoom
                    if (ev.type === 'pinchstart') {
                        initialScale = instance.getZoom()
                        instance.zoomAtPoint(initialScale * ev.scale, {x: ev.center.x, y: ev.center.y})
                    }

                    instance.zoomAtPoint(initialScale * ev.scale, {x: ev.center.x, y: ev.center.y})
                    })

                    // Prevent moving the page on some devices when panning over SVG
                    options.svgElement.addEventListener('touchmove', function(e){ e.preventDefault(); });
                }

                , destroy: function(){
                    this.hammer.destroy()
                }
            }

            // Expose to window namespace for testing purposes
            window.panZoom = svgPanZoom('#main', {
            zoomEnabled: true
            , controlIconsEnabled: true
            , fit: 1
            , center: 1
            , customEventsHandler: eventsHandler
            });
        };
        
        var needwebsocket = 1;
        //判断是否需要ws  1需要0不需要
        if (needwebsocket == 1) {
            var ws;
            var Connected = false;
            //var LoginOk = false;
            var ReceiveHeart;//收到Heart的时间

            var TimerWs;
            //10秒定时器
            function TimerWs_tick() {
                //判断心跳是否超时 40秒
                var InterS = ((new Date()).getTime() - ReceiveHeart.getTime()) / 1000;
                //$("#spanLoginUser").text(InterS);
                if (InterS > 35) {
                    Wsclose();
                    ReceiveHeart = new Date();
                    //$("#spanLoginUser").text(InterS + "超时");
                }
                else {
                    if (Connected) {
                        //10秒发送一次心跳
                        var strLoginPack = {"type":"heart","val":new Date().Format("yyyy-MM-dd hh:mm:ss")};
                        sendMyMessage(strLoginPack);
                    }
                    else {
                        connect(); 
                    }
                }
            }
        } else {
            TimerWs = null;
        }
        function Wsclose() {
            try {
                if (ws != null) {
                    ws.close();
                }
                ws = null;
                Connected = false;
            }
            catch (ex) {
            }
        }

        function initData(){
            $.ajax({
                url: '/jxt/sanshui1'
                ,data: {}
                ,type:'post'
                ,success: function(data){
                    if(data.yc&&data.yc.length>0){
                        for(var i=0;i<data.yc.length;i++){
                            var d1=document.getElementById(data.yc[i].id);
                            //console.info(d1);
                            if(d1){
                                SetText(d1,data.yc[i].value);
                            }
                        }
                    }
                    if(data.yx&&data.yx.length>0){
                        for(var i=0;i<data.yx.length;i++){
                            if((parseInt(data.yx[i].value)%2)==1){
                                if(document.getElementById(data.yx[i].id)){
                                    SetPropertyValue(document.getElementById(data.yx[i].id),"xlink:href","#AlarmA_on");
                                }
                            }
                            if((parseInt(data.yx[i].value)%2)==0){
                                if(document.getElementById(data.yx[i].id)){
                                    SetPropertyValue(document.getElementById(data.yx[i].id),"xlink:href","#AlarmA");
                                }
                            }
                        }
                    }
                    if(data.yk&&data.yk.length>0){
                        for(var i=0;i<data.yk.length;i++){
                            if(document.getElementById(data.yk[i].id)){
                                document.getElementById(data.yk[i].id).style.cursor="pointer";
                                $("#"+data.yk[i].id).bind('click',data.yk[i].id,function(obj){ykClick(obj.data);});//ykClick(data.yk[i].id)
                                if((parseInt(data.yk[i].value)%2)==1){
                                    document.getElementById(data.yk[i].id).setAttribute("xlink:href","#SwitchC_on");
                                    
                                }
                                if((parseInt(data.yk[i].value)%2)==0){
                                    document.getElementById(data.yk[i].id).setAttribute("xlink:href","#SwitchC");
                                    
                                }
                            }
                        }
                    }
                }
            });
        }
        function ykClick(key){
            var nowProp=document.getElementById(key).getAttribute("xlink:href");
            var ykVal;
            //console.info(nowProp);
            if(nowProp.indexOf("on")<0){
                ykVal=1;
                //document.getElementById(key).setAttribute("xlink:href","#SwitchC_on");
            }
            else{
                ykVal=0;
                //document.getElementById(key).setAttribute("xlink:href","#SwitchC");
            }
            id=key.replace("yk_","");
            //发送控制命令
            sendMyMessage({"type":"cmd","ykKey":id,"ykVal":ykVal});
            

        }
        //自定义请求
        //请求WEBSOCKET
      var ws = null;
      var clientid=null;
      function connect() {
        var that=this;
         var url = "ws://"+ ServerIP +":"+ ServerPort +"/wsudp";
         if ('WebSocket' in window) {
            ws = new WebSocket(url);
         } else if ('MozWebSocket' in window) {
            ws = new MozWebSocket(url);
         } else {
            alert('此浏览器不支持WebSokcet,请更换浏览器使用,谢谢！.');
            return;
         }
         ws.onopen = function () {
            Connected=true;
         };
         ws.onmessage = function (event) {
            try {
                if (typeof event.data == "string") {
                    DealWsMsg(event.data);
                }
                else {
                    // alert("非文本消息");
                }
            }
            catch (ex) {
            }
         };
         ws.onclose = function () {
            Wsclose();
            that.clientid=null;
         };
      }
      function DealWsMsg(msg){
        var data=JSON.parse(msg);
        if(data&&data.type){
            switch(data.type){
                case "clientid":
                    this.clientid=data.val;
                    console.info("收到clientid,发送SN注册命令");
                    sendMyMessage({"type":"regSn","val":"30000002"});
                    break;
                case "yc"://遥测值
                    elm=document.getElementById(data.key);
                    SetText(elm,data.val);
                    break;
                case "yx"://状态的反馈
                    if(data.val=="1"){
                        SetPropertyValue(document.getElementById(data.key),"xlink:href","#AlarmA_on");
                    }
                    if(data.val=="0"){
                        SetPropertyValue(document.getElementById(data.key),"xlink:href","#AlarmA");
                    }
                    break;
                case "yk"://确认成功的反馈
                    if(data.val=="1"){
                        SetPropertyValue(document.getElementById(data.key),"xlink:href","#SwitchC_on");
                    }
                    if(data.val=="0"){
                        SetPropertyValue(document.getElementById(data.key),"xlink:href","#SwitchC");
                    }
                    break;
                case "heart":
                    ReceiveHeart = new Date();
                    console.info("收到心跳");
                    break;
            }
        }
        else{
            console.info(data);
        }
      }

      function sendMyMessage(msg) {
         var msg = JSON.stringify(msg);
         ws.send(msg);
      }
      
      Date.prototype.Format = function (fmt) { //author: meizz 
            var o = {
                "M+": this.getMonth() + 1, //月份 
                "d+": this.getDate(), //日 
                "h+": this.getHours(), //小时 
                "m+": this.getMinutes(), //分 
                "s+": this.getSeconds(), //秒 
                "q+": Math.floor((this.getMonth() + 3) / 3), //季度 
                "S": this.getMilliseconds() //毫秒 
            };
            if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
            for (var k in o)
                if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
            return fmt;
        }
